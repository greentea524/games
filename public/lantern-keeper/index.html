<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lantern Keeper</title>
    <style>
      :root {
        /* GBC-inspired 4-color palette */
        --darkest: #0f1a12;
        --dark: #2d4a33;
        --light: #86b06a;
        --lightest: #e0f8cf;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--darkest);
        color: var(--lightest);
        font-family: "Courier New", monospace;
        text-align: center;
      }
      .frame {
        border: 4px solid var(--dark);
        padding: 3rem 2.5rem;
        max-width: 30rem;
        image-rendering: pixelated;
      }
      .lantern {
        font-size: 3rem;
        animation: flicker 2.5s infinite;
      }
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        45% { opacity: 0.85; }
        50% { opacity: 0.6; }
        55% { opacity: 0.9; }
      }
      h1 {
        margin: 1rem 0 0.5rem;
        color: var(--light);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-size: 1.4rem;
      }
      p { color: var(--light); line-height: 1.6; font-size: 0.9rem; }
      .soon {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.4rem 1rem;
        border: 2px solid var(--light);
        color: var(--lightest);
        font-size: 0.8rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      a { color: var(--lightest); }
    </style>
  </head>
  <body>
    <main class="frame">
      <div class="lantern">🏮</div>
      <h1>Lantern Keeper</h1>
      <p>A firefly-keeper lights lanterns in a dark forest.<br />Each flame reveals the path ahead.</p>
      <span class="soon">Coming soon</span>
    </main>
  </body>
</html>
