<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lantern Keeper</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0b0f0c; user-select: none; -webkit-user-select: none; overflow: hidden; touch-action: none; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
      body { display: flex; align-items: center; justify-content: center; }
      #game canvas { image-rendering: pixelated; }
      

      .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 15, 12, 0.9); display: flex; align-items: center; justify-content: center; z-index: 10; color: #e0f8cf; font-family: monospace; text-align: center; padding: 15px; box-sizing: border-box; flex-direction: column; font-size: 14px; }
      .overlay.hidden { display: none; }
      .overlay h2 { margin-top: 0; color: #e0f8cf; font-size: 12px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; font-family: "Courier New", Courier, monospace; }
      .overlay p { line-height: 1.4; margin: 5px 0; }
      .overlay-btn { background: transparent; border: none; color: #86b06a; font-family: "Courier New", Courier, monospace; font-size: 10px; cursor: pointer; text-decoration: none; position: relative; padding: 2px 0; transition: color 0.1s; }
      .overlay-btn:hover { color: #e0f8cf; }
      .overlay-btn:hover::before { content: '> '; position: absolute; left: -12px; color: #e0f8cf; }

        body { flex-direction: column; background: #e0e0e0; justify-content: center; gap: 20px; }
        .gb-shell { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100%; padding: 20px 10px; box-sizing: border-box; }
        .gb-logo { font-family: sans-serif; font-style: italic; font-weight: bold; color: #888; margin-bottom: 15px; font-size: 1.2rem; letter-spacing: 2px; }
        
        #game { border: 15px solid #222; border-radius: 10px 10px 40px 10px; background: #000; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        .gb-controls { display: flex; justify-content: space-around; align-items: center; width: 100%; max-width: 400px; padding: 10px; margin-bottom: 15px; }
        
        .d-pad { position: relative; width: 120px; height: 120px; }
        .d-btn { position: absolute; background: #333; border-radius: 4px; touch-action: none; transition: background 0.1s; }
        .d-btn:active, .d-btn.active-kb { background: #111; }
        .d-up { top: 0; left: 40px; width: 40px; height: 40px; border-radius: 4px 4px 0 0; }
        .d-down { bottom: 0; left: 40px; width: 40px; height: 40px; border-radius: 0 0 4px 4px; }
        .d-left { top: 40px; left: 0; width: 40px; height: 40px; border-radius: 4px 0 0 4px; }
        .d-right { top: 40px; right: 0; width: 40px; height: 40px; border-radius: 0 4px 4px 0; }
        .d-center { top: 40px; left: 40px; width: 40px; height: 40px; background: #333; position: absolute; }

        .action-btns { display: flex; gap: 15px; transform: rotate(-20deg); align-items: flex-end; }
        .a-btn { width: 50px; height: 50px; background: #b00; border-radius: 50%; box-shadow: 0 4px 0 #500; touch-action: none; display: flex; align-items: center; justify-content: center; color: #500; font-family: sans-serif; font-weight: bold; transition: transform 0.1s, box-shadow 0.1s, background 0.1s; }
        .a-btn:active, .a-btn.active-kb { transform: translateY(4px); box-shadow: none; background: #900; }
        
        .sys-btns { display: flex; gap: 30px; justify-content: center; width: 100%; max-width: 400px; padding-bottom: 10px; margin-top: 25px; }
        .s-btn-container { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .s-btn { width: 45px; height: 12px; background: #555; border-radius: 6px; transform: rotate(-20deg); box-shadow: 0 2px 0 #222; touch-action: none; transition: transform 0.1s, box-shadow 0.1s, background 0.1s; }
        .s-btn:active, .s-btn.active-kb { transform: rotate(-20deg) translateY(2px); box-shadow: none; background: #333; }
        .s-btn-container span { font-family: sans-serif; font-size: 0.6rem; color: #888; letter-spacing: 1px; font-weight: bold; }
    </style>
  </head>
  <body>
    <div class="gb-shell">
      <div class="gb-logo">RETRO PAD</div>
      <div id="game">
        <div id="overlay" class="overlay hidden">
          <div id="overlay-text"></div>
        </div>
      </div>

      <div class="gb-controls">
        <div class="d-pad">
          <div class="d-center"></div>
          <div class="d-btn d-up" data-key="ArrowUp"></div>
          <div class="d-btn d-down" data-key="ArrowDown"></div>
          <div class="d-btn d-left" data-key="ArrowLeft"></div>
          <div class="d-btn d-right" data-key="ArrowRight"></div>
        </div>
        <div class="action-btns">
          <div class="a-btn" data-key="KeyX">B</div>
          <div class="a-btn" data-key="KeyZ">A</div>
        </div>
      </div>
      <div class="sys-btns">
        <div class="s-btn-container">
          <div class="s-btn" id="btn-select"></div>
          <span>SELECT</span>
        </div>
        <div class="s-btn-container">
          <div class="s-btn" id="btn-start"></div>
          <span>START</span>
        </div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
